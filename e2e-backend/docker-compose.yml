# Minimal Spree backend for E2E tests.
#
# Service is named `web` (Postgres + Redis + Spree) so the @spree/cli tool
# can find it via `docker compose exec web …`. Meilisearch and Sidekiq are
# intentionally omitted: Spree falls back to SQL search without Meili, and
# the worker is not required for the checkout golden path (transactional
# emails go through the storefront, not the Rails worker).
#
# Usage (driven by ../scripts/e2e/bootstrap-spree.sh):
#   docker compose up -d --wait
#   npx @spree/cli seed && npx @spree/cli sample-data
#   npx @spree/cli api-key create --name E2E --type publishable
#
# Spree exposes the storefront API on http://localhost:4000/api/v3/store.
# Postgres and Redis are reachable only on the compose network — use
# `docker compose exec postgres psql -U postgres` etc. for debugging.

name: storefront-e2e

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: pg_isready -U postgres
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    # `latest` tracks the newest published Spree, matching what
    # create-spree-app / spree-starter build. Override for a pinned run:
    #   SPREE_IMAGE=ghcr.io/spree/spree:5.6.0.rc4.1 docker compose … up
    image: ${SPREE_IMAGE:-ghcr.io/spree/spree:latest}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres@postgres:5432/spree_e2e
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY_BASE: e2e_secret_key_base_not_for_production_use_only_e2e_e2e_e2e_e2e
      RAILS_FORCE_SSL: "false"
      RAILS_ASSUME_SSL: "false"
      # The canonical public host Spree uses for URLs generated outside a request
      # context — including the image/attachment URLs in Store API responses.
      # Without it those fall back to the store's default (`localhost`), yielding
      # unreachable `https://localhost/...` image URLs; the storefront reaches the
      # backend at the host-mapped :4000, so point RAILS_HOST there. With both SSL
      # flags false above, the scheme is http.
      RAILS_HOST: localhost:4000
      # Don't run SolidQueue inside Puma. Sample-data enqueues a storm of image
      # download/transform jobs; running them in-process on the single web
      # process starves API requests (ECONNREFUSED / multi-second page loads)
      # and races the tests. With no dedicated worker the jobs simply queue and
      # never run — fine here, since the checkout golden path doesn't depend on
      # any job output (see note above), and the tests never assert on images.
      SOLID_QUEUE_IN_PUMA: "false"
    ports:
      - "4000:3000"
    healthcheck:
      test: curl -f http://localhost:3000/up || exit 1
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
